<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkEdu - Inscription</title>
  <link rel="stylesheet" href="./inscription.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="background-slideshow" id="app-slideshow"></div>

  <header class="app-header">
    <img src="log1.png" alt="Logo LinkEdu" class="app-logo">
    <span class="app-tagline">L'Excellence Numérique</span>
  </header>

  <main class="main-container">
    <div class="welcome-section">
      <h1>Rejoindre <span class="text-brand">LinkEdu</span></h1>
      <p>Créez votre compte pour démarrer.</p>
    </div>

    <div class="auth-section">
      <form id="register-form" class="auth-form">
        <div class="input-group">
            <label>Vous êtes ?</label>
            <select id="role" class="custom-select" required>
                <option value="student">Élève / Étudiant</option>
                <option value="parent">Parent</option>
            </select>
        </div>
        <div class="input-group">
          <label>Nom complet du Parent/Tuteur</label>
          <div class="input-wrapper"><i class="fa-solid fa-user-tie input-icon"></i>
            <input type="text" id="tutorName" placeholder="Ex: Jean Dupont" required>
          </div>
        </div>
        <div class="input-group">
          <label>Email du Parent (Identifiant)</label>
          <div class="input-wrapper"><i class="fa-solid fa-envelope input-icon"></i>
            <input type="email" id="parentEmail" placeholder="Ex: parent@email.com" required>
          </div>
        </div>
        <div class="input-group">
          <label>Nom et Prénom de l'élève</label>
          <div class="input-wrapper"><i class="fa-solid fa-user-graduate input-icon"></i>
            <input type="text" id="fullname" placeholder="Ex: Jean Junior" required>
          </div>
        </div>
        <div class="input-group">
          <label>Mot de passe</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" id="password" placeholder="Minimum 8 caractères" required>
            <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('password')"></i>
          </div>
        </div>
        <div class="input-group">
          <label>Confirmer le mot de passe</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" id="confirmPassword" placeholder="Répétez le mot de passe" required>
            <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('confirmPassword')"></i>
          </div>
        </div>
        <button type="submit" class="btn-signup-submit">Créer mon compte</button>
      </form>
      
      <div style="margin-top: 15px; text-align: center;">
        <p style="font-size: 0.7rem; margin-bottom: 5px;">Vous avez déjà un compte ?</p>
        <a href="./login.html" class="btn-secondary">Se connecter</a>
      </div>
    </div>
  </main>

  <footer class="app-footer">
    <p>Portail Élève LinkEdu | v1.2.0 | Tous droits réservés</p>
  </footer>

  <script src="./inscription4.js"></script>
</body>
</html>
